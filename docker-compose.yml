version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - PIXABAY_API_KEY=${PIXABAY_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/downloads:/app/downloads
      - ./backend/outputs:/app/outputs
      - ./backend/test.db:/app/test.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend